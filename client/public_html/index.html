<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chirper / Sign in</title>
    <link rel="stylesheet" href="account.css">
    <script src="./src/components/login.js" defer></script>
  </head>
  <body>
    <div class="login-page">
      <!-- Left branding panel -->
      <div class="brand-panel">
        <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-logo">

        </svg>
      </div>

      <!-- Right form panel -->
      <div class="form-panel">
        <div class="form-container">
          <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" class="form-logo">
            <path d="M191.179 273.824C240.235 297.511 305.516 282.723 327.848 235.07C343.653 201.345 294.142 174.478 268.869 180.597C249.795 185.215 238.443 210.424 226.139 201.065C216.677 165.605 199.9 119.51 135.192 107.37C114.091 103.412 83.5311 110.64 102.336 135.815C116.496 154.766 137.36 163.983 158.442 173.765C164.792 176.714 169.78 183.842 176.581 185.72C178.199 186.166 181.717 185.007 181.525 186.671C181.105 190.238 113.899 155.977 108.125 179.498C103.955 196.484 152.426 206.208 162.693 208.177C163.338 208.3 167.696 208.583 167.631 209.126C167.291 212.044 128.996 205.366 122.548 219.126C113.925 237.519 146.169 239.099 156.097 238.053C164.394 237.176 172.809 236.947 180.889 235.438C181.156 235.389 194.153 233.997 169.23 238.769C147.16 242.995 90.4779 253.756 88.9641 262.487C87.4503 271.218 95.0462 273.682 99.275 281.556C103.504 289.429 106.52 291.001 110.939 295.051C115.357 299.1 142.753 259.14 172.051 268.915M323.418 199.974C348.126 209.727 352.589 199.404 329.977 213.31M291.997 210.007C291.781 209.411 291.563 208.813 291.345 208.215" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <h1>Happening now</h1>
          <h2>Join today.</h2>

          <!-- Login form -->
          <div id="loginDiv" class="auth-form">
            <h3>Sign in to Chirper</h3>
            <div class="formMessage hidden" id="loginMessage"></div>
            <input id="usernameLogin" type="text" placeholder="Username" autocomplete="username">
            <input id="passwordLogin" type="password" placeholder="Password" autocomplete="current-password">
            <button id="loginButton" class="btn-primary">Sign in</button>
            <p class="switch-link">Don't have an account?
              <a href="#" class="link" id="goToCreate">Sign up</a>
            </p>
          </div>

          <!-- Register form -->
          <div id="createDiv" class="auth-form hidden">
            <h3>Create your account</h3>
            <div class="formMessage hidden" id="createMessage"></div>
            <input id="usernameCreate" type="text" placeholder="Username" autocomplete="username">
            <input id="passwordCreate" type="password" placeholder="Password" autocomplete="new-password">
            <button id="createButton" class="btn-primary">Create account</button>
            <p class="switch-link">Already have an account?
              <a href="#" class="link" id="goToLogin">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
